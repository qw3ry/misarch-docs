name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      invalidate_cache:
        description: "Invalidate cache"
        required: false
        default: "false"
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
      - name: Invalidate cache if requested
        if: ${{ github.event.inputs.invalidate_cache == 'true' }}
        run: rm -rf ~/.cache ~/.npm node_modules static/renderedDiagrams/*
      - name: Puppeteer dependencies
        run: sudo apt-get install ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release wget xdg-utils
      - name: Install dependencies
        run: npm ci
      - name: Install puppeteer browsers
        run: npx puppeteer browsers install
      - name: Show puppeteer cache
        run: find -type f ~/.cache/puppeteer
      - name: Render Mermaid and HyLiMo diagrams
        run: npm run render-diagrams
      - name: Build website
        run: npm run build
      # Popular action to deploy to GitHub Pages:
      # Docs: https://github.com/peaceiris/actions-gh-pages#%EF%B8%8F-docusaurus
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Build output to publish to the `gh-pages` branch:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build